<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TryFit AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}

/* HEADER */
header {
  padding:40px 20px;
}

.logo {
  height:120px;
  filter: drop-shadow(0 0 10px #00ffcc);
}

.logo-text {
  font-size:34px;
  font-weight:bold;
  margin-top:10px;

  background: linear-gradient(90deg, #00ffcc, #00aaff, #a100ff);
  -webkit-background-clip: text;
  color: transparent;
}

/* HERO */
.hero {
  padding:60px 20px;
}

.hero h2 {
  color:#00ffcc;
  font-size:34px;
}

.hero p {
  color:#aaa;
}

.btn {
  margin-top:20px;
  padding:15px 35px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* DEMO */
.demo {
  padding:60px 20px;
}

/* STATS */
.stats {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:60px 20px;
  flex-wrap:wrap;
}

.card {
  background:#111;
  padding:30px;
  border-radius:15px;
  width:180px;
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 30px rgba(0,255,204,0.5);
}

.card h3 {
  color:#00ffcc;
  font-size:36px;
  margin:0;
}

.card p {
  color:#aaa;
  margin-top:10px;
}

/* CLIENTES */
.clientes {
  padding:60px 20px;
}

.clientes h2 {
  margin-bottom:30px;
}

.logos {
  display:flex;
  justify-content:center;
  gap:40px;
  align-items:center;
  flex-wrap:wrap;
}

.logos img {
  height:70px;
  filter: grayscale(100%);
  opacity:0.8;
  transition:0.3s;
}

.logos img:hover {
  filter:none;
  opacity:1;
}

/* FOOTER */
footer {
  padding:40px;
  color:#666;
}
</style>

</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1 class="logo-text">TRYFIT AI</h1>
</header>

<section class="hero">
  <h2>Aumente suas vendas com tecnologia provador virtual</h2>
  <p>Seus clientes vendo a roupa no próprio corpo antes de comprar</p>

  <a href="https://wa.me/5511999999999" target="_blank">
    <button class="btn">Falar no WhatsApp</button>
  </a>
</section>

<section class="demo">
  <h2>Veja funcionando</h2>

  <input type="file" id="upload"><br>

  <button class="btn" onclick="previewImage()">Testar agora</button><br>

  <img id="preview" style="max-width:300px;margin-top:20px;">
</section>

<section class="stats">
  <div class="card">
    <h3>+30%</h3>
    <p>Aumento de conversão</p>
  </div>

  <div class="card">
    <h3>-40%</h3>
    <p>Redução de trocas</p>
  </div>
</section>

<section class="clientes">
  <h2>Empresas que já utilizam</h2>

  <div class="logos">
    <img src="golpe.png">
  </div>
</section>

<footer>
© 2026 TryFit AI
</footer>

<script>
function previewImage(){
  const file = document.getElementById("upload").files[0];
  const preview = document.getElementById("preview");

  if(file){
    preview.src = URL.createObjectURL(file);
  }
}
</script>

</body>
</html>
