<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dresyn AI — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:       #000;
    --surface:  #0d0d0d;
    --s2:       #141414;
    --border:   #1f1f1f;
    --primary:  #00ffcc;
    --accent:   #a100ff;
    --danger:   #ff4444;
    --text:     #fff;
    --muted:    #666;
    --dim:      #333;
    --radius:   12px;
    --font:     'Montserrat', sans-serif;
    --tr:       200ms ease;
  }
 
  html { scroll-behavior: smooth; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
 
  @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin    { to { transform:rotate(360deg); } }
  @keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
  @keyframes orb1    { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-15px);} }
  @keyframes orb2    { 0%,100%{transform:translate(0,0);}50%{transform:translate(-15px,10px);} }
 
  /* ── BG ──────────────────────────────────────────────────── */
  .bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
  .bg-orb-1 { width:400px;height:400px;background:radial-gradient(circle,rgba(0,255,204,0.06) 0%,transparent 70%);top:-80px;right:-80px;animation:orb1 14s ease-in-out infinite; }
  .bg-orb-2 { width:300px;height:300px;background:radial-gradient(circle,rgba(161,0,255,0.05) 0%,transparent 70%);bottom:10%;left:-60px;animation:orb2 18s ease-in-out infinite; }
 
  /* ── LOGIN ───────────────────────────────────────────────── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    position: relative; z-index: 10;
    animation: fadeIn 0.4s ease both;
  }
 
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 360px;
    animation: fadeUp 0.5s ease both;
  }
 
  .login-logo {
    text-align: center; margin-bottom: 32px;
  }
 
  .login-logo-text {
    font-size: 20px; font-weight: 900; letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--primary), #00aaff, var(--primary));
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; animation: shimmer 3s linear infinite;
  }
 
  .login-sub {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-top: 4px;
  }
 
  .login-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block;
  }
 
  .login-input {
    width: 100%; padding: 14px 16px;
    background: var(--s2); border: 1px solid var(--border);
    border-radius: 8px; font-family: var(--font); font-size: 14px;
    font-weight: 500; color: var(--text); outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
    margin-bottom: 6px;
  }
  .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,255,204,0.08); }
  .login-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,68,68,0.1); }
 
  .login-error { font-size:11px; color:#ff6666; margin-bottom:16px; min-height:16px; }
 
  .login-btn {
    width: 100%; padding: 14px; background: var(--primary); color: #000;
    border: none; border-radius: 8px; font-family: var(--font);
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer;
    transition: opacity var(--tr), box-shadow var(--tr);
    margin-top: 8px;
  }
  .login-btn:hover { opacity: 0.88; box-shadow: 0 0 24px rgba(0,255,204,0.25); }
 
  /* ── PAINEL ──────────────────────────────────────────────── */
  #adminPanel { display: none; position: relative; z-index: 10; animation: fadeIn 0.4s ease both; }
 
  /* header */
  .admin-header {
    padding: 20px 24px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(0,0,0,0.92);
    backdrop-filter: blur(12px); z-index: 50;
  }
 
  .admin-brand { font-size: 16px; font-weight: 900; letter-spacing: -0.01em; }
  .admin-brand span {
    background: linear-gradient(90deg, var(--primary), #00aaff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
 
  .admin-actions { display: flex; gap: 10px; align-items: center; }
 
  .btn-sm {
    padding: 8px 16px; border-radius: 8px; font-family: var(--font);
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; border: none;
    transition: opacity var(--tr), transform var(--tr);
  }
  .btn-sm:active { transform: scale(0.97); }
 
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
 
  .btn-danger { background: rgba(255,68,68,0.1); color: #ff6666; border: 1px solid rgba(255,68,68,0.2); }
  .btn-danger:hover { background: rgba(255,68,68,0.18); }
 
  .btn-export { background: var(--primary); color: #000; }
  .btn-export:hover { opacity: 0.85; }
 
  /* main */
  .admin-main { padding: 32px 24px; max-width: 900px; margin: 0 auto; }
 
  /* stats */
  .admin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
 
  .admin-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    transition: border-color var(--tr), transform var(--tr);
  }
  .admin-stat:hover { border-color: rgba(0,255,204,0.2); transform: translateY(-2px); }
 
  .astat-val { font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 6px; }
  .astat-lbl { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
 
  /* filters */
  .admin-filters {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
 
  .filter-btn {
    padding: 7px 14px; border-radius: 100px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font);
    transition: border-color var(--tr), color var(--tr), background var(--tr);
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
 
  .search-input {
    padding: 8px 14px; border-radius: 8px; background: var(--s2);
    border: 1px solid var(--border); font-family: var(--font);
    font-size: 12px; font-weight: 500; color: var(--text); outline: none;
    transition: border-color var(--tr); flex: 1; min-width: 140px;
  }
  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: var(--muted); }
 
  /* table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
 
  table { width: 100%; border-collapse: collapse; }
 
  thead { background: var(--s2); }
  th {
    padding: 14px 16px; text-align: left;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
 
  td {
    padding: 14px 16px; font-size: 13px; font-weight: 500;
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
 
  tr:last-child td { border-bottom: none; }
 
  tr:hover td { background: rgba(255,255,255,0.02); }
 
  .badge-tipo {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 100px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .badge-email { background: rgba(0,170,255,0.1); color: #00aaff; border: 1px solid rgba(0,170,255,0.2); }
  .badge-whatsapp { background: rgba(0,255,204,0.08); color: var(--primary); border: 1px solid rgba(0,255,204,0.2); }
 
  .contato-cell { font-weight: 600; letter-spacing: 0.01em; }
 
  .copy-btn {
    padding: 5px 10px; font-size: 10px; font-weight: 600;
    border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer;
    font-family: var(--font); letter-spacing: 0.04em; text-transform: uppercase;
    transition: border-color var(--tr), color var(--tr);
  }
  .copy-btn:hover { border-color: var(--primary); color: var(--primary); }
  .copy-btn.copied { border-color: var(--primary); color: var(--primary); }
 
  .del-btn {
    padding: 5px 10px; font-size: 10px; font-weight: 600;
    border-radius: 6px; border: 1px solid transparent;
    background: transparent; color: var(--dim); cursor: pointer;
    font-family: var(--font); letter-spacing: 0.04em; text-transform: uppercase;
    transition: border-color var(--tr), color var(--tr), background var(--tr);
  }
  .del-btn:hover { border-color: rgba(255,68,68,0.3); color: #ff6666; background: rgba(255,68,68,0.06); }
 
  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--muted);
    font-size: 13px; line-height: 1.6;
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
 
  .date-cell { color: var(--muted); font-size: 12px; }
 
  /* paginação */
  .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .page-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--font); font-weight: 600; transition: all var(--tr);
    display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover { border-color: var(--primary); color: var(--primary); }
  .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
 
  /* toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface); border: 1px solid var(--primary);
    border-radius: 10px; padding: 12px 20px;
    font-size: 13px; font-weight: 600; color: var(--primary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
 
  @media (max-width: 600px) {
    .admin-stats { grid-template-columns: 1fr 1fr; }
    th:nth-child(3), td:nth-child(3) { display: none; }
    .admin-actions .btn-outline { display: none; }
  }
</style>
</head>
<body>
 
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
 
<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-text">Dresyn AI</div>
      <div class="login-sub">Painel do Administrador</div>
    </div>
 
    <label class="login-label" for="loginPass">Senha de acesso</label>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') entrar()">
    <div class="login-error" id="loginError"></div>
 
    <button class="login-btn" onclick="entrar()">Entrar no painel</button>
  </div>
</div>
 
<!-- ── PAINEL ADMIN ────────────────────────────────────────── -->
<div id="adminPanel">
 
  <header class="admin-header">
    <div class="admin-brand">Dresyn <span>Admin</span></div>
    <div class="admin-actions">
      <button class="btn-sm btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
      <button class="btn-sm btn-danger" onclick="limparTudo()">Limpar dados</button>
      <button class="btn-sm btn-outline" onclick="sair()">Sair</button>
    </div>
  </header>
 
  <main class="admin-main">
 
    <!-- Stats -->
    <div class="admin-stats">
      <div class="admin-stat">
        <div class="astat-val" id="statTotal">0</div>
        <div class="astat-lbl">Total de leads</div>
      </div>
      <div class="admin-stat">
        <div class="astat-val" id="statEmail">0</div>
        <div class="astat-lbl">E-mails</div>
      </div>
      <div class="admin-stat">
        <div class="astat-val" id="statWA">0</div>
        <div class="astat-lbl">WhatsApp</div>
      </div>
    </div>
 
    <!-- Filtros -->
    <div class="admin-filters">
      <button class="filter-btn active" data-filter="todos" onclick="setFiltro(this)">Todos</button>
      <button class="filter-btn" data-filter="email" onclick="setFiltro(this)">E-mail</button>
      <button class="filter-btn" data-filter="whatsapp" onclick="setFiltro(this)">WhatsApp</button>
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar contato…" oninput="renderTabela()">
    </div>
 
    <!-- Tabela -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Contato</th>
            <th>Tipo</th>
            <th>Data / Hora</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="leadsBody"></tbody>
      </table>
    </div>
 
    <div class="pagination" id="pagination"></div>
 
  </main>
</div>
 
<div id="toast"></div>
 
<script>
  /* ── CONFIGURAÇÃO ─────────────────────────────────────────
     Altere a senha abaixo para a que quiser.
     Depois de alterar, salve o arquivo.
  ──────────────────────────────────────────────────────── */
  const SENHA_ADMIN = 'dresyn2026';
 
  /* ── Estado ───────────────────────────────────────────── */
  let filtroAtual = 'todos';
  let paginaAtual = 1;
  const POR_PAGINA = 15;
 
  /* ── Login ────────────────────────────────────────────── */
  function entrar() {
    const val = document.getElementById('loginPass').value;
    const inp = document.getElementById('loginPass');
    const err = document.getElementById('loginError');
    if (val === SENHA_ADMIN) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display  = 'block';
      inp.classList.remove('error'); err.textContent = '';
      renderTudo();
    } else {
      inp.classList.add('error');
      err.textContent = 'Senha incorreta. Tente novamente.';
      inp.value = '';
      inp.focus();
    }
  }
 
  function sair() {
    document.getElementById('adminPanel').style.display  = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPass').value = '';
  }
 
  /* ── Dados ────────────────────────────────────────────── */
  function getLeads() {
    return JSON.parse(localStorage.getItem('dresyn_leads') || '[]');
  }
 
  function salvarLeads(leads) {
    localStorage.setItem('dresyn_leads', JSON.stringify(leads));
  }
 
  /* ── Render completo ──────────────────────────────────── */
  function renderTudo() {
    const leads = getLeads();
    const emails = leads.filter(l => l.tipo === 'email').length;
    const was    = leads.filter(l => l.tipo === 'whatsapp').length;
    document.getElementById('statTotal').textContent = leads.length;
    document.getElementById('statEmail').textContent = emails;
    document.getElementById('statWA').textContent    = was;
    renderTabela();
  }
 
  /* ── Filtro ───────────────────────────────────────────── */
  function setFiltro(btn) {
    filtroAtual = btn.dataset.filter;
    paginaAtual = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabela();
  }
 
  /* ── Tabela ───────────────────────────────────────────── */
  function renderTabela() {
    const busca = document.getElementById('searchInput').value.toLowerCase();
    let leads = getLeads();
 
    /* filtro tipo */
    if (filtroAtual !== 'todos') {
      leads = leads.filter(l => l.tipo === filtroAtual);
    }
    /* filtro busca */
    if (busca) {
      leads = leads.filter(l => l.contato.toLowerCase().includes(busca));
    }
 
    /* paginação */
    const total  = leads.length;
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = leads.slice(inicio, inicio + POR_PAGINA);
    const npages = Math.ceil(total / POR_PAGINA);
 
    const body = document.getElementById('leadsBody');
 
    if (total === 0) {
      body.innerHTML = `<tr><td colspan="5">
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <div>Nenhum lead encontrado.</div>
          <div style="color:#333;margin-top:4px;font-size:12px">Os contatos capturados pelo provador virtual aparecerão aqui.</div>
        </div>
      </td></tr>`;
    } else {
      body.innerHTML = pagina.map((lead, i) => {
        const idx   = inicio + i + 1;
        const data  = formatarData(lead.data);
        const badge = lead.tipo === 'email'
          ? `<span class="badge-tipo badge-email">✉ E-mail</span>`
          : `<span class="badge-tipo badge-whatsapp">💬 WhatsApp</span>`;
        return `<tr>
          <td style="color:var(--dim);font-size:12px">${idx}</td>
          <td class="contato-cell">${escHtml(lead.contato)}</td>
          <td>${badge}</td>
          <td class="date-cell">${data}</td>
          <td style="display:flex;gap:6px;align-items:center">
            <button class="copy-btn" onclick="copiar(this, '${escAttr(lead.contato)}')">Copiar</button>
            <button class="del-btn"  onclick="deletarLead(${inicio + i})">✕</button>
          </td>
        </tr>`;
      }).join('');
    }
 
    /* paginação */
    renderPaginacao(npages);
  }
 
  function renderPaginacao(npages) {
    const pag = document.getElementById('pagination');
    if (npages <= 1) { pag.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= npages; i++) {
      html += `<button class="page-btn ${i === paginaAtual ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
    }
    pag.innerHTML = html;
  }
 
  function irPagina(n) {
    paginaAtual = n;
    renderTabela();
    document.querySelector('.admin-main').scrollIntoView({ behavior: 'smooth' });
  }
 
  /* ── Ações ────────────────────────────────────────────── */
  function copiar(btn, texto) {
    navigator.clipboard.writeText(texto).then(() => {
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);
    });
  }
 
  function deletarLead(idx) {
    /* idx é relativo aos leads ALL (não filtrados) — precisamos achar o correto */
    const busca    = document.getElementById('searchInput').value.toLowerCase();
    let   leads    = getLeads();
    let   filtered = filtroAtual !== 'todos' ? leads.filter(l => l.tipo === filtroAtual) : [...leads];
    if (busca) filtered = filtered.filter(l => l.contato.toLowerCase().includes(busca));
 
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const lead   = filtered[idx];
    if (!lead) return;
 
    /* remove da lista geral */
    const gi = leads.findIndex(l => l.contato === lead.contato && l.data === lead.data);
    if (gi !== -1) { leads.splice(gi, 1); salvarLeads(leads); }
    toast('Lead removido.');
    renderTudo();
  }
 
  function limparTudo() {
    if (!confirm('Tem certeza que deseja apagar TODOS os leads? Esta ação não pode ser desfeita.')) return;
    localStorage.removeItem('dresyn_leads');
    toast('Todos os leads foram removidos.');
    renderTudo();
  }
 
  function exportarCSV() {
    const leads = getLeads();
    if (leads.length === 0) { toast('Nenhum lead para exportar.'); return; }
    const linhas = [['Contato','Tipo','Data']].concat(
      leads.map(l => [l.contato, l.tipo, formatarData(l.data)])
    );
    const csv  = linhas.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `dresyn_leads_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV exportado com sucesso!');
  }
 
  /* ── Helpers ──────────────────────────────────────────── */
  function formatarData(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' +
           d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }
 
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
 
  function escAttr(s) {
    return String(s).replace(/'/g,"\\'");
  }
 
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
